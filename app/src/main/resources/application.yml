server:
  port: 8080

spring:
  application:
    name: atlas-platform

application:
  version: 1.0.0

aws:
  region: us-east-1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    com.atlas.platform: INFO
    software.amazon.awssdk: WARN
