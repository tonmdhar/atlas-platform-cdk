apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atlas-platform
  template:
    metadata:
      labels:
        app: atlas-platform
    spec:
      serviceAccountName: atlas-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: atlas-platform
        image: IMAGE_TAG
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "default"
        - name: AWS_REGION
          value: "us-east-1"
        resources:
          requests:
            cpu: 256m
            memory: 512Mi
          limits:
            cpu: 512m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
